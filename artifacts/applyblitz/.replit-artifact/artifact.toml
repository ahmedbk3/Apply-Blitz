kind = "web"
previewPath = "/"
title = "ApplyBlitz"
version = "1.0.0"
id = "artifacts/applyblitz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21577

[services.development]
run = "pnpm --filter @workspace/applyblitz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/applyblitz", "run", "build" ]
publicDir = "artifacts/applyblitz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21577"
BASE_PATH = "/"
